<!doctype html>
<html lang="zh-CN" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>刷题 App</title>
    <style>
      :root {
        color-scheme: light dark;
        --splash-bg: #f8fafc;
        --splash-panel: rgba(255, 255, 255, 0.86);
        --splash-muted: #eef3f8;
        --splash-border: rgba(49, 70, 100, 0.12);
        --splash-text: #152033;
        --splash-secondary: #607088;
        --splash-shadow: 0 18px 48px rgba(49, 70, 100, 0.1);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --splash-bg: #0b111c;
          --splash-panel: rgba(21, 30, 45, 0.86);
          --splash-muted: #202c3f;
          --splash-border: rgba(179, 195, 218, 0.15);
          --splash-text: #eef3f8;
          --splash-secondary: #a9b5c6;
          --splash-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
        }
      }
      html, body, #root { margin: 0; min-height: 100%; }
      .splash {
        position: relative;
        display: grid;
        min-height: 100dvh;
        place-items: center;
        overflow: hidden;
        padding: 24px;
        box-sizing: border-box;
        background: var(--splash-bg);
        color: var(--splash-text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .splash::before {
        content: '';
        position: absolute;
        width: min(68vw, 560px);
        height: min(58vh, 460px);
        border-radius: 999px;
        background:
          radial-gradient(circle at 34% 34%, rgba(132, 183, 153, 0.18), transparent 36%),
          radial-gradient(circle at 70% 50%, rgba(79, 111, 149, 0.18), transparent 38%),
          color-mix(in srgb, var(--splash-panel) 42%, transparent);
        filter: blur(18px);
        opacity: 0.94;
      }
      .splash-stage {
        position: relative;
        width: min(88vw, 420px);
        display: grid;
        justify-items: center;
        gap: 16px;
      }
      .splash-phone {
        width: min(72vw, 260px);
        min-height: 330px;
        padding: 16px 14px;
        border: 1px solid var(--splash-border);
        border-radius: 30px;
        background: var(--splash-panel);
        box-shadow: var(--splash-shadow);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }
      .splash-phone-top {
        width: 62px;
        height: 5px;
        margin: 0 auto 18px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--splash-text) 22%, transparent);
      }
      .splash-screen {
        display: grid;
        gap: 12px;
        min-height: 238px;
        padding: 18px;
        border-radius: 18px;
        background: var(--splash-muted);
      }
      .splash-screen span {
        height: 42px;
        border-radius: 8px;
        background: linear-gradient(90deg, color-mix(in srgb, var(--splash-text) 8%, transparent), color-mix(in srgb, var(--splash-text) 14%, transparent), color-mix(in srgb, var(--splash-text) 8%, transparent));
        background-size: 220% 100%;
        animation: splash-shimmer 1.3s ease-in-out infinite;
      }
      .splash-card {
        display: grid;
        justify-items: center;
        gap: 10px;
        width: min(86vw, 340px);
        padding: 22px 24px;
        border: 1px solid var(--splash-border);
        border-radius: 8px;
        background: var(--splash-panel);
        box-shadow: var(--splash-shadow);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        text-align: center;
      }
      .splash-mark {
        position: relative;
        display: inline-grid;
        width: 30px;
        height: 30px;
        place-items: center;
        color: var(--splash-text);
      }
      .splash-mark span {
        position: absolute;
        width: 7px;
        height: 22px;
        border-radius: 999px;
        background: currentColor;
        transform: rotate(-35deg);
      }
      .splash-mark span:first-child { left: 8px; }
      .splash-mark span:last-child { left: 15px; }
      .splash h1 {
        margin: 0;
        color: var(--splash-text);
        font-size: 17px;
        font-weight: 800;
      }
      .splash p {
        margin: 0;
        color: var(--splash-secondary);
        font-size: 13px;
      }
      .splash-loader {
        display: flex;
        gap: 5px;
        margin-top: 2px;
      }
      .splash-loader span {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--splash-text);
        animation: splash-pulse 0.9s ease-in-out infinite;
      }
      .splash-loader span:nth-child(2) { animation-delay: 0.12s; }
      .splash-loader span:nth-child(3) { animation-delay: 0.24s; }
      @keyframes splash-shimmer {
        0% { background-position: 120% 0; }
        100% { background-position: -120% 0; }
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.35; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(-3px); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="splash">
        <div class="splash-stage">
          <div class="splash-phone" aria-hidden="true">
            <div class="splash-phone-top"></div>
            <div class="splash-screen">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <div class="splash-card">
            <div class="splash-mark" aria-hidden="true"><span></span><span></span></div>
            <h1>正在准备刷题环境</h1>
            <p>同步账号、题库与离线缓存</p>
            <div class="splash-loader" aria-hidden="true"><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
